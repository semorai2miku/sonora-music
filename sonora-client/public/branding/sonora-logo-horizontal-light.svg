<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @font-face {
        font-family: 'Orbitron';
        src: url('./Orbitron-Bold.ttf') format('truetype');
        font-weight: 700;
      }

      @font-face {
        font-family: 'Orbitron';
        src: url('./Orbitron-Regular.ttf') format('truetype');
        font-weight: 400;
      }

      .brand {
        font-family: 'Orbitron', sans-serif;
        font-size: 92px;
        font-weight: 700;
        letter-spacing: 0.16em;
      }

      .subline {
        font-family: 'Orbitron', sans-serif;
