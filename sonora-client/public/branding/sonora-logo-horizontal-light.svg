        font-weight: 400;
        letter-spacing: 0.5em;
      }
    </style>

    <linearGradient id="panelGradient" x1="40" y1="34" x2="200" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1424" />
      <stop offset="1" stop-color="#08111C" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="68" y1="54" x2="159" y2="165" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" />
      <stop offset="0.55" stop-color="#4DA3FF" />
      <stop offset="1" stop-color="#F6FBFF" />
    </linearGradient>
    <linearGradient id="ruleGradient" x1="284" y1="178" x2="692" y2="178" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F7CFF" />
      <stop offset="1" stop-color="#08111C" />
