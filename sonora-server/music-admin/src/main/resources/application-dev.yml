# ========================
# 开发环境配置
# ========================
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:13306}/sonora_music?characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

  rabbitmq:
    host: localhost
    port: 5672
    username: sonora
    password: sonora123
    virtual-host: /sonora
    listener:
      simple:
        acknowledge-mode: auto
        missing-queues-fatal: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123456
  bucket: sonora-music

# 日志级别
logging:
  level:
    root: INFO
    com.sonora: DEBUG
