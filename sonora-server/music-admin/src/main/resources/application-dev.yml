# ========================
# 开发环境配置
# ========================
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sonora_music?characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

# MinIO 配置
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: admin123456
  bucket: sonora-music

# 日志级别
logging:
  level:
    root: INFO
    com.sonora: DEBUG
